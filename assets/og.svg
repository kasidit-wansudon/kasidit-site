<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="t">
  <title id="t">Kasidit — Mindful AI coding framework</title>
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#f59e0b" fill-opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="0%" r="50%" fx="50%" fy="0%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0d1117"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="600" cy="0" rx="800" ry="400" fill="url(#glow)"/>

  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <text x="580" y="325" font-size="96" font-weight="700" fill="#f0f6fc"
          letter-spacing="-2">Kasidit</text>
    <circle cx="800" cy="315" r="10" fill="#fbbf24"/>
    <text x="600" y="385" font-size="32" font-weight="400" fill="#c9d1d9">
      Mindful AI coding framework
    </text>
  </g>

  <text x="1170" y="600" font-size="20" fill="#fbbf24" text-anchor="end"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace">kasidit-wansudon.github.io/kasidit-site</text>
</svg>
